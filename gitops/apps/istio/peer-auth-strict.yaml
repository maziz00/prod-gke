# Enforce strict mTLS across the entire mesh.
# PeerAuthentication in istio-system namespace applies as a cluster-wide mesh default.
# All pod-to-pod traffic must use mutual TLS — plaintext is rejected.
#
# Applied by ArgoCD as part of the istio Application (recurse: true).

apiVersion: security.istio.io/v1beta1
kind: PeerAuthentication
metadata:
  name: default-strict-mtls
  namespace: istio-system
  annotations:
    # Wave 3: apply only after istio-base (0), istiod (1), istio-gateway (2) are Healthy.
    # root-app waits for all wave-N resources to be Healthy before starting wave N+1.
    argocd.argoproj.io/sync-wave: "3"
spec:
  mtls:
    mode: STRICT
