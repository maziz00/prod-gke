# Istio installation via three ArgoCD Applications (ordered by sync-wave).
# Wave 0: istio-base (CRDs) → Wave 1: istiod (control plane) → Wave 2: gateway
#
# mTLS is enforced cluster-wide via peer-auth-strict.yaml.

---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: istio-base
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://istio-release.storage.googleapis.com/charts
    chart: base
    targetRevision: "1.28.5"
    helm:
      releaseName: istio-base
  destination:
    server: https://kubernetes.default.svc
    namespace: istio-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true

---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: istiod
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://istio-release.storage.googleapis.com/charts
    chart: istiod
    targetRevision: "1.28.5"
    helm:
      releaseName: istiod
      values: |
        global:
          meshID: prod-gke-mesh
          network: prod-gke-network
        meshConfig:
          accessLogFile: /dev/stdout
          enableAutoMtls: true
          defaultConfig:
            tracing:
              sampling: 1.0
        pilot:
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
  destination:
    server: https://kubernetes.default.svc
    namespace: istio-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true

---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: istio-gateway
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://istio-release.storage.googleapis.com/charts
    chart: gateway
    targetRevision: "1.28.5"
    helm:
      releaseName: istio-ingressgateway
      values: |
        # Gateway chart 1.25+ enforces a strict schema — only configure via
        # the chart's own values.yaml keys. Service type defaults to LoadBalancer.
        podAnnotations:
          prometheus.io/scrape: "true"
          prometheus.io/port: "15020"
  destination:
    server: https://kubernetes.default.svc
    namespace: istio-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
