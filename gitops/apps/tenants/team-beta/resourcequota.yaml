apiVersion: v1
kind: ResourceQuota
metadata:
  name: team-beta-quota
  namespace: team-beta
spec:
  hard:
    # Compute — higher memory allocation for data-processing workloads.
    requests.cpu: "8"
    requests.memory: 16Gi
    limits.cpu: "16"
    limits.memory: 32Gi
    # Object counts
    pods: "30"
    services: "15"
    persistentvolumeclaims: "10"
    # Prevent unbounded secret creation (security hygiene).
    secrets: "30"
    configmaps: "30"
