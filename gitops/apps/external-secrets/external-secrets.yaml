# External Secrets Operator (ESO) — syncs secrets from GCP Secret Manager into
# native Kubernetes Secrets. This decouples secret storage from the cluster:
# secrets live in Secret Manager (audited, versioned, IAM-controlled), and ESO
# replicates them into the namespace where they are needed.
#
# Dependency chain:
#   Wave 0-2: Istio  →  Wave 1: ESO (this)  →  Wave 2: ClusterSecretStore
#   →  Wave 3: ExternalSecrets (grafana-secret, alertmanager-secret)
#
# Workload Identity: ESO pods use the KSA "external-secrets" (in namespace
# "external-secrets") which is annotated by bootstrap-argocd.sh with the GCP SA
# email from `terraform output eso_sa_email`. The GCP SA has
# roles/secretmanager.secretAccessor on the project.

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: external-secrets
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://charts.external-secrets.io
    chart: external-secrets
    targetRevision: "0.10.x"
    helm:
      releaseName: external-secrets
      values: |
        # Schedule ESO on system nodes (they are always available and not spot-preempted).
        tolerations:
          - key: CriticalAddonsOnly
            operator: Exists
        webhook:
          tolerations:
            - key: CriticalAddonsOnly
              operator: Exists
        certController:
          tolerations:
            - key: CriticalAddonsOnly
              operator: Exists
  destination:
    server: https://kubernetes.default.svc
    namespace: external-secrets
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
