# ClusterSecretStore — cluster-scoped backend definition for ESO.
# All ExternalSecrets in any namespace can reference this store by name.
#
# Backend: GCP Secret Manager, authenticated via Workload Identity.
# ESO's KSA (external-secrets/external-secrets) is bound to the GCP SA
# (prod-gke-eso@PROJECT_ID.iam.gserviceaccount.com) which has
# roles/secretmanager.secretAccessor. No service account keys are used.
#
# Placeholder values below are replaced by bootstrap-argocd.sh before applying:
#   projectID       ← terraform output -raw project_id
#   clusterLocation ← terraform output -raw region
#   clusterName     ← terraform output -raw cluster_name
#
# Apply order: sync-wave "2" — after ESO CRDs are installed by wave "1".
#
# NOTE: this file contains no sensitive values. All placeholders (YOUR_*) are
# replaced at deploy time by the bootstrap script, never stored here.
---
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: gcp-secret-manager
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  provider:
    gcpsm:
      # GCP project that owns the secrets in Secret Manager.
      # Replaced by bootstrap-argocd.sh: terraform output -raw project_id
      projectID: "YOUR_PROJECT_ID"
      auth:
        workloadIdentity:
          # Cluster location and name are needed for the WI token exchange.
          # Replaced by bootstrap-argocd.sh: terraform output -raw region
          clusterLocation: "YOUR_REGION"
          # Replaced by bootstrap-argocd.sh: terraform output -raw cluster_name
          clusterName: "YOUR_CLUSTER_NAME"
          # The ESO Kubernetes ServiceAccount (must have WI annotation with GCP SA email).
          serviceAccountRef:
            name: external-secrets
            namespace: external-secrets
