# ExternalSecret: Grafana admin credentials
#
# Syncs the Grafana admin username and password from GCP Secret Manager into a
# native Kubernetes Secret named "grafana-admin-secret" in the "monitoring" namespace.
#
# Required GCP Secret Manager secrets (create before first sync):
#   grafana-admin-credentials   ← JSON: {"admin-user": "admin", "admin-password": "..."}
#
# Create the secret (replace <password> with a strong random password):
#   gcloud secrets create grafana-admin-credentials \
#     --replication-policy=automatic \
#     --data-file=- <<'EOF'
#   {"admin-user":"admin","admin-password":"<password>"}
#   EOF
#
# The kube-prometheus-stack values.yaml references this secret:
#   grafana.admin.existingSecret: grafana-admin-secret
#   grafana.admin.userKey: admin-user
#   grafana.admin.passwordKey: admin-password
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: grafana-admin-secret
  namespace: monitoring
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: gcp-secret-manager
    kind: ClusterSecretStore
  target:
    name: grafana-admin-secret
    creationPolicy: Owner
  data:
    - secretKey: admin-user
      remoteRef:
        key: grafana-admin-credentials
        property: admin-user
    - secretKey: admin-password
      remoteRef:
        key: grafana-admin-credentials
        property: admin-password
