# ExternalSecret: AlertManager Slack webhook
#
# Syncs the Slack incoming webhook URL from GCP Secret Manager into a native
# Kubernetes Secret named "alertmanager-slack-secret" in the "monitoring" namespace.
#
# Required GCP Secret Manager secret (create before first sync):
#   alertmanager-slack-webhook  ← plain text Slack webhook URL
#
# Create the secret:
#   gcloud secrets create alertmanager-slack-webhook \
#     --replication-policy=automatic \
#     --data-file=- <<'EOF'
#   https://hooks.slack.com/services/YOUR/SLACK/WEBHOOK
#   EOF
#
# The monitoring/values.yaml alertmanager config references this secret:
#   alertmanager.config.receivers[].slack_configs[].api_url comes from
#   the "slack_webhook_url" key in this Secret.
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: alertmanager-slack-secret
  namespace: monitoring
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: gcp-secret-manager
    kind: ClusterSecretStore
  target:
    name: alertmanager-slack-secret
    creationPolicy: Owner
  data:
    - secretKey: slack_webhook_url
      remoteRef:
        key: alertmanager-slack-webhook
