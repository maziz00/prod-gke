# kube-prometheus-stack values for prod-gke.
# Deploys: Prometheus, Grafana, AlertManager, node-exporter, kube-state-metrics.

prometheus:
  prometheusSpec:
    retention: 15d
    retentionSize: "45GB"
    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: standard-rwo
          accessModes: [ReadWriteOnce]
          resources:
            requests:
              storage: 50Gi
    resources:
      requests:
        cpu: 200m
        memory: 512Mi
      limits:
        cpu: 1000m
        memory: 2Gi
    # Discover ServiceMonitors across all namespaces (not just the helm release namespace).
    serviceMonitorSelectorNilUsesHelmValues: false
    podMonitorSelectorNilUsesHelmValues: false
    # Scrape Istio metrics from the Istio control plane and data plane.
    additionalScrapeConfigs:
      - job_name: "istio-mesh"
        kubernetes_sd_configs:
          - role: endpoints
            namespaces:
              names: [istio-system]
        relabel_configs:
          - source_labels: [__meta_kubernetes_service_name, __meta_kubernetes_endpoint_port_name]
            action: keep
            regex: istio-pilot;http-monitoring

grafana:
  enabled: true
  persistence:
    enabled: true
    storageClassName: standard-rwo
    size: 10Gi
  # Grafana admin password is managed by External Secrets Operator.
  # The ESO ExternalSecret creates a native Secret named "grafana-admin-secret".
  admin:
    existingSecret: grafana-admin-secret
    userKey: admin-user
    passwordKey: admin-password
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  sidecar:
    dashboards:
      enabled: true
      label: grafana_dashboard
      searchNamespace: ALL  # Pick up dashboards from any namespace.
  dashboardProviders:
    dashboardproviders.yaml:
      apiVersion: 1
      providers:
        - name: default
          orgId: 1
          folder: Platform
          type: file
          options:
            path: /var/lib/grafana/dashboards/default

alertmanager:
  alertmanagerSpec:
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
  config:
    global:
      resolve_timeout: 5m
    route:
      group_by: ["alertname", "namespace", "severity"]
      group_wait: 5m
      group_interval: 5m
      repeat_interval: 12h
      receiver: slack-platform
      routes:
        # Critical alerts page immediately — no batching delay.
        - match:
            severity: critical
          group_wait: 0s
          receiver: slack-platform
    receivers:
      - name: slack-platform
        slack_configs:
          - channel: "#platform-alerts"
            # Webhook URL is synced from GCP Secret Manager by ESO into
            # the "alertmanager-slack-secret" Secret (key: slack_webhook_url).
            api_url_secret:
              name: alertmanager-slack-secret
              key: slack_webhook_url
            send_resolved: true
            title: '[{{ "{{" }} .Status | toUpper {{ "}}" }}{{ "{{" }} if eq .Status "firing" {{ "}}" }}:{{ "{{" }} .Alerts.Firing | len {{ "}}" }}{{ "{{" }} end {{ "}}" }}] {{ "{{" }} .CommonLabels.alertname {{ "}}" }}'
            text: |-
              {{ "{{" }} range .Alerts {{ "}}" }}
              *Namespace:* {{ "{{" }} .Labels.namespace {{ "}}" }}
              *Severity:* {{ "{{" }} .Labels.severity {{ "}}" }}
              *Summary:* {{ "{{" }} .Annotations.summary {{ "}}" }}
              *Description:* {{ "{{" }} .Annotations.description {{ "}}" }}
              {{ "{{" }} end {{ "}}" }}
    inhibit_rules:
      # Suppress warning-level alerts when a critical alert fires for the same
      # alertname+namespace — reduces noise during active incidents.
      - source_match:
          severity: critical
        target_match:
          severity: warning
        equal: ["alertname", "namespace"]

# System components scheduled on system nodes (tolerate the system taint).
nodeExporter:
  tolerations:
    - operator: Exists

kubeStateMetrics:
  tolerations:
    - key: CriticalAddonsOnly
      operator: Exists
