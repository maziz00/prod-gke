apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "go-metrics-api.fullname" . }}
  labels:
    {{- include "go-metrics-api.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "go-metrics-api.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress

  ingress:
    # Allow traffic from Istio sidecar proxies in istio-system.
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: istio-system
    # Allow Prometheus scraping from the monitoring namespace.
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - protocol: TCP
          port: 8080

  egress:
    # Allow DNS resolution (required for all egress traffic).
    - ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # Allow HTTPS egress (for GCP API calls via Workload Identity, etc.).
    - ports:
        - protocol: TCP
          port: 443
