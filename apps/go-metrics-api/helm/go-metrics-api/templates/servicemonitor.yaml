{{- if .Values.serviceMonitor.enabled }}
# ServiceMonitor tells Prometheus Operator where to scrape this service.
# Requires kube-prometheus-stack with serviceMonitorSelectorNilUsesHelmValues: false.
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ include "go-metrics-api.fullname" . }}
  namespace: {{ .Values.serviceMonitor.namespace | default "monitoring" }}
  labels:
    {{- include "go-metrics-api.labels" . | nindent 4 }}
    # This label must match the Prometheus serviceMonitorSelector.
    release: kube-prometheus-stack
spec:
  selector:
    matchLabels:
      {{- include "go-metrics-api.selectorLabels" . | nindent 6 }}
  namespaceSelector:
    matchNames:
      - {{ .Release.Namespace }}
  endpoints:
    - port: http
      path: {{ .Values.serviceMonitor.path | default "/metrics" }}
      interval: {{ .Values.serviceMonitor.interval | default "30s" }}
      scheme: http
{{- end }}
