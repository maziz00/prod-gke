apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "go-metrics-api.fullname" . }}
  labels:
    {{- include "go-metrics-api.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "go-metrics-api.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        # Force pod restart when ConfigMap changes (good practice for config-driven apps).
        checksum/values: {{ .Values | toYaml | sha256sum }}
        # Prometheus scraping via annotations (fallback if ServiceMonitor is not used).
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
      labels:
        {{- include "go-metrics-api.selectorLabels" . | nindent 8 }}
        version: {{ .Chart.AppVersion | quote }}
    spec:
      serviceAccountName: {{ include "go-metrics-api.serviceAccountName" . }}

      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}

      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}

      {{- with .Values.topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- toYaml . | nindent 8 }}
      {{- end }}

      # Give pods 30 seconds to complete in-flight requests on preemption/upgrade.
      terminationGracePeriodSeconds: 30

      containers:
        {{- /*
        Resolve project_id at render time from the cluster-config Secret.
        The Secret is created by bootstrap-argocd.sh and is never stored in git.
        Falls back to .Values.image.repository if the Secret doesn't exist yet
        (e.g., dry-run or local helm template invocations).
        */}}
        {{- $secret := lookup "v1" "Secret" .Release.Namespace "cluster-config" }}
        {{- $projectId := "" }}
        {{- if and $secret $secret.data }}
        {{-   $projectId = index $secret.data "project_id" | b64dec }}
        {{- end }}
        {{- $imageRepo := ternary (printf "gcr.io/%s/go-metrics-api" $projectId) .Values.image.repository (ne $projectId "") }}
        - name: {{ .Chart.Name }}
          image: "{{ $imageRepo }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}

          ports:
            - name: http
              containerPort: 8080
              protocol: TCP

          env:
            # Downward API: injects pod identity into the application for logging/metrics.
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            # GCP project ID — read from cluster-config Secret, not hardcoded.
            - name: GCP_PROJECT_ID
              valueFrom:
                secretKeyRef:
                  name: cluster-config
                  key: project_id
                  optional: true

          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}

          resources:
            {{- toYaml .Values.resources | nindent 12 }}

          livenessProbe:
            {{- toYaml .Values.livenessProbe | nindent 12 }}

          readinessProbe:
            {{- toYaml .Values.readinessProbe | nindent 12 }}

          startupProbe:
            {{- toYaml .Values.startupProbe | nindent 12 }}
